<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きょうのじかん</title>
<!-- Firebase compat SDK (v9) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCmCnPEY9IBtED3h9mkvPOVIic4zFJSCFA",
  authDomain: "test-project-c0141.firebaseapp.com",
  projectId: "test-project-c0141",
  storageBucket: "test-project-c0141.firebasestorage.app",
  messagingSenderId: "122537961923",
  appId: "1:122537961923:web:0dfc0e35677d8fcb2a3576"
};
firebase.initializeApp(firebaseConfig);
const db       = firebase.firestore();
const auth     = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();
const DATA_REF = db.collection('timeline').doc('appData');

window.loginWithGoogle = () => auth.signInWithPopup(provider).catch(e => alert('ログインエラー: ' + e.message));
window.logoutGoogle    = () => auth.signOut();

const CLIENT_ID = Math.random().toString(36).slice(2);

// デフォルト予定（初回のみFirestoreに書き込む）
const DEFAULT_EVENTS = [
  { name: 'あさごはん',             start: '7:00',  end: '7:30',  emoji: '🍳', days: [0,1,2,3,4,5,6] },
  { name: 'はみがき・くすり・きがえ', start: '7:30',  end: '7:55',  emoji: '🪥', days: [1,2,3,4,5] },
  { name: 'がっこう（月・水）',       start: '8:20',  end: '13:30', emoji: '🎒', days: [1,3] },
  { name: 'がっこう（火・木・金）',   start: '8:20',  end: '14:30', emoji: '🎒', days: [2,4,5] },
  { name: 'よるごはん',             start: '18:30', end: '20:00', emoji: '🍜', days: [0,1,2,3,4,5,6] },
  { name: 'おふろ',                 start: '20:00', end: '20:30', emoji: '🛁', days: [0,1,2,3,4,5,6] },
  { name: 'しゅくだい',             start: '20:30', end: '21:00', emoji: '📝', days: [1,2,3,4,5] },
  { name: 'ねるじゅんび',           start: '21:30', end: '22:00', emoji: '😴', days: [0,1,2,3,4,5,6] },
];

window.saveToFirestore = async () => {
  try {
    await DATA_REF.set({
      events:    window._events    || [],
      whosHome:  window._whosHome  || {},
      updatedAt: Date.now(),
      writtenBy: CLIENT_ID
    });
  } catch(e) { console.error('save error: ' + e.message); }
};

// ままカード状態はlocalStorageに保存（当日限り・デバイス依存）
function saveMamaCardLocal() {
  const today = new Date().toDateString();
  const data = window._mamaCardState.slots.map(s => ({
    startTime: s && s.startTime ? s.startTime.toISOString() : null,
    endTime:   s && s.endTime   ? s.endTime.toISOString()   : null,
  }));
  localStorage.setItem('mamaCard_' + today, JSON.stringify(data));
}

function loadMamaCardLocal() {
  const today = new Date().toDateString();
  try {
    const raw = localStorage.getItem('mamaCard_' + today);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data)) {
      window._mamaCardState.slots = data.map(s => ({
        startTime: s.startTime ? new Date(s.startTime) : null,
        endTime:   s.endTime   ? new Date(s.endTime)   : null,
      }));
    }
  } catch(e) { /* 無視 */ }
}

let _unsubscribe = null;

auth.onAuthStateChanged(user => {
  const loginScreen = document.getElementById('loginScreen');
  const appScreen   = document.getElementById('appScreen');
  if (user) {
    loginScreen.style.display = 'none';
    appScreen.style.display   = 'flex';
    document.getElementById('authUserName').textContent = user.displayName || user.email;
    if (_unsubscribe) _unsubscribe();
    _unsubscribe = DATA_REF.onSnapshot(snap => {
      const d = snap.exists ? snap.data() : null;
      // 自分の書き込みは無視
      if (d && d.writtenBy === CLIENT_ID) return;

      if (!snap.exists) {
        // Firestoreにドキュメント自体が存在しない場合のみデフォルト書き込み
        window._events   = DEFAULT_EVENTS.map(e => ({...e}));
        window._whosHome = {};
        window.saveToFirestore();
      } else {
        // ドキュメントが存在する場合は必ずそのデータを使う（eventsが空でも上書きしない）
        window._events   = d.events   || [];
        window._whosHome = d.whosHome || {};
      }
      if (window._appReady) {
        window._syncFromFirestore();
      } else {
        window._initApp();
      }
    }, e => {
      console.error('snapshot error: ' + e.message);
      window._events = DEFAULT_EVENTS.map(e => ({...e}));
      window._initApp();
    });
  } else {
    if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
    loginScreen.style.display = 'flex';
    appScreen.style.display   = 'none';
    window._appReady = false;
  }
});
</script>
<!-- アプリ初期化関数（Firebaseより先に定義） -->
<script>
window._appReady = false;

window._syncFromFirestore = function() {
  allEvents = window._events || [];
  updateWhosHome();
  events = getEventsForDate(selectedDate);
  buildTimeline();
  buildMonthCalendar();
  buildSidebarList();
  updateNowLine();
};

window._initApp = function() {
  allEvents = window._events || [];
  updateWhosHome();
  initMamaSelects();
  // ままカード状態をlocalStorageから復元
  loadMamaCardLocal();
  if (window.updateMamaCards) window.updateMamaCards();
  if (window.updateMamaTimer) window.updateMamaTimer();
  events = getEventsForDate(selectedDate);
  updateHeader();
  buildMonthCalendar();
  buildSidebarList();
  buildTimeline();
  updateNowLine();
  window._appReady = true;
  setInterval(() => {
    updateNowLine();
    buildSidebarList();
    checkAlarms();
    updateMamaTimer();
    if (dateStr(realToday) !== dateStr(new Date())) location.reload();
  }, 10000);
};
</script>

<style>

.form-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 14px; font-family: inherit; font-size: 15px;
  color: var(--text); background: #fff; outline: none;
}
.form-input:focus { border-color: var(--now); }
.time-row { display: flex; gap: 8px; align-items: center; }
.time-part { display: flex; gap: 4px; align-items: center; flex: 1; }
.time-select {
  flex: 1; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 8px; font-family: inherit; font-size: 15px;
  color: var(--text); background: #fff; outline: none; text-align: center;
}
.time-select:focus { border-color: var(--now); }
.ampm-select {
  border: 1.5px solid var(--border); border-radius: 10px;
  padding: 10px 6px; font-family: inherit; font-size: 13px;
  font-weight: 700; color: var(--text); background: #fff; outline: none; cursor: pointer;
}
.ampm-select:focus { border-color: var(--now); }
.emoji-picker { width: 100%; }
.emoji-cat-tabs {
  display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px;
}
.emoji-cat-tab {
  padding: 4px 8px; border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--panel-bg); font-family: inherit; font-size: 11px;
  font-weight: 700; cursor: pointer; color: var(--text); transition: all 0.1s;
}
.emoji-cat-tab.active { background: var(--now); color: #fff; border-color: var(--now); }
.emoji-row { display: flex; flex-wrap: wrap; gap: 6px; }
.emoji-pick {
  width: 38px; height: 38px; border-radius: 10px;
  border: 2px solid var(--border); background: var(--block-bg);
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.emoji-pick.selected { border-color: var(--now); background: rgba(43,110,255,0.08); }
.form-submit {
  width: 100%; background: var(--now); color: #fff; border: none;
  border-radius: 12px; padding: 14px; font-family: inherit;
  font-size: 16px; font-weight: 900; cursor: pointer; margin-top: 4px;
}
.form-submit:hover { opacity: 0.85; }
.day-checks { display: flex; gap: 8px; flex-wrap: wrap; }
.day-check-label {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 10px;
}
.day-check-label input { display: none; }
.day-check-label.checked { background: var(--now); color: #fff; border-color: var(--now); }

/* 編集メニュー */
.edit-modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.edit-modal-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-family: inherit; font-size: 16px; font-weight: 900; cursor: pointer;
  text-align: left; display: flex; align-items: center; gap: 12px;
}
.edit-modal-btn.edit   { background: var(--block-bg); color: var(--text); }
.edit-modal-btn.delete { background: #FEE2E2; color: #CC2222; }
/* ── ログイン画面 ── */
#loginScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 24px;
}
.login-box {
  background: var(--panel-bg);
  border-radius: 24px;
  border: 1.5px solid var(--border);
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}
.login-title { font-size: 28px; font-weight: 900; color: var(--text); }
.login-sub   { font-size: 14px; color: var(--muted); font-weight: 700; }
.login-google-btn {
  display: flex; align-items: center; gap: 12px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 24px;
  font-family: inherit; font-size: 16px; font-weight: 900;
  cursor: pointer; color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transition: box-shadow 0.2s;
}
.login-google-btn:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.login-google-icon { width: 24px; height: 24px; }

/* ── ままのひとりじかん ── */
.mama-card-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.mama-card-label { font-size: 14px; font-weight: 900; color: var(--text); letter-spacing: 0.04em; align-self: flex-start; }
.mama-cards-row { display: flex; gap: 6px; justify-content: center; }
.mama-card-btn {
  width: 46px; height: 54px; border-radius: 10px;
  border: 2px solid var(--border); background: #FFF0F6;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; font-family: inherit; transition: all 0.15s; font-size: 18px;
}
.mama-card-btn span { font-size: 9px; font-weight: 900; color: #CC3377; }
.mama-card-btn:hover { border-color: #CC3377; transform: scale(1.05); }
.mama-card-btn.used { background: #F0F0F0; border-color: #CCC; }
.mama-card-btn.used span { color: #AAA; }
.mama-card-btn.used:hover { border-color: #CC3377; transform: scale(1.05); }
.mama-card-btn.unavailable { background: #FAF0F6; border-color: #F0E0EA; opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.mama-card-btn.unavailable span { color: #DDB8CC; }
.mama-timer-wrap { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 6px; background: #FFF0F6; border-radius: 12px; padding: 10px 8px; border: 1.5px solid rgba(204,51,119,0.2); }
.mama-timer-label { font-size: 11px; font-weight: 900; color: #CC3377; text-align: center; line-height: 1.5; }

/* ── いま・つぎ 全画面オーバーレイ ── */
.nn-fullscreen-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--panel-bg);
  z-index: 300;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px 32px;
}
.nn-fullscreen-overlay.open { display: flex; }
.nn-fullscreen-overlay .nn-row {
  width: 100%;
  max-width: 480px;
}
.nn-fullscreen-overlay .nn-divider { width: 100%; max-width: 480px; }
.nn-fullscreen-overlay .nn-timer-section { align-items: center; }
.nn-fullscreen-overlay .nn-timer-wrap {
  width: min(70vw, 70vh);
  height: min(70vw, 70vh);
}
.nn-fullscreen-overlay .nn-timer-svg {
  width: 100%;
  height: 100%;
}
.nn-fullscreen-overlay .nn-timer-min  { font-size: clamp(72px, 18vw, 140px); }
.nn-fullscreen-overlay .nn-timer-unit { font-size: clamp(20px, 5vw, 36px); }
.nn-fullscreen-overlay .nn-timer-label { font-size: 14px; }
.nn-fullscreen-close {
  position: fixed;
  top: 16px; right: 16px;
  width: 40px; height: 40px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--block-bg);
  cursor: pointer;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted);
  z-index: 301;
}
.home-badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.home-badge {
  padding: 5px 16px; border-radius: 20px;
  font-size: clamp(13px, 1.4vw, 18px); font-weight: 900;
  cursor: pointer; transition: all 0.15s;
  border: 2px solid var(--border);
  background: var(--block-bg); color: var(--muted);
  font-family: inherit;
}
.home-badge.mama-on { background: #FFE0EF; color: #CC3377; border-color: #CC3377; }
.home-badge.papa-on { background: #D6EAFF; color: #1A6ACC; border-color: #1A6ACC; }
.auth-area {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.auth-name {
  font-size: 12px; font-weight: 700; color: var(--muted);
  max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.logout-btn {
  padding: 5px 10px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--panel-bg);
  font-family: inherit; font-size: 11px; font-weight: 700;
  cursor: pointer; color: var(--muted);
}
.logout-btn:hover { color: var(--ng); border-color: var(--ng); }

#appScreen { display: none; width: 100vw; height: 100vh; flex-direction: row; overflow: hidden; flex-shrink: 0; }

/* ══════════════════════════════
   モバイルレイアウト
══════════════════════════════ */
@media (max-width: 768px) {
  #appScreen {
    flex-direction: column;
  }

  /* サイドバー・いま・つぎパネルは非表示 */
  .sidebar,
  .now-next-panel {
    display: none !important;
  }

  /* メインエリアを全幅に */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* ヘッダーをコンパクトに */
  .main-header {
    padding: 10px 16px 8px;
    gap: 8px;
  }
  .main-header-date  { font-size: 20px; }
  .main-header-youbi { font-size: 20px; }
  .main-header-clock { font-size: 20px; }
  .auth-area { display: none; }

  /* モバイル日付ナビ */
  .mobile-date-nav {
    display: flex !important;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--block-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .date-nav-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
    cursor: pointer;
  }
  .date-nav-today {
    font-size: 12px;
    font-weight: 700;
    color: var(--now);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 10px;
    border: 1.5px solid var(--now);
  }

  /* タブバー */
  .mobile-tabs {
    display: flex !important;
    background: var(--panel-bg);
    border-bottom: 1.5px solid var(--border);
    flex-shrink: 0;
  }
  .mobile-tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-family: inherit;
    font-size: 13px;
    font-weight: 900;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mobile-tab.active {
    color: var(--now);
    border-bottom-color: var(--now);
  }

  /* タブコンテンツ */
  .mobile-content {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .tab-timeline { display: flex; flex-direction: column; height: 100%; }
  .tab-timeline.hidden { display: none; }

  /* mobile-content が残り高さを埋める */
  .mobile-content { flex: 1; min-height: 0; }

  /* いま・つぎタブ */
  .tab-nowNext {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;
    padding: 20px 24px;
    gap: 20px;
  }
  .tab-nowNext.hidden { display: none; }
  .tab-nowNext .nn-row { width: 100%; }
  .tab-nowNext .nn-label { font-size: 12px; }
  .tab-nowNext .nn-value { font-size: 26px; }
  .tab-nowNext .nn-row.is-now .nn-value { font-size: 30px; }
  .tab-nowNext .nn-div { width: 100%; height: 1px; background: var(--border); }
  .tab-nowNext .nn-timer-section { align-items: center; }
  .tab-nowNext .nn-timer-wrap { width: 180px; height: 180px; }
  .tab-nowNext .nn-timer-svg { width: 180px; height: 180px; }
  .tab-nowNext .nn-timer-min { font-size: 48px; }
  .tab-nowNext .nn-timer-unit { font-size: 16px; }
  .tab-nowNext .nn-timer-label { font-size: 15px; }

  /* フッターボタン */
  .mobile-footer {
    display: flex !important;
    padding: 12px 16px;
    background: var(--panel-bg);
    border-top: 1.5px solid var(--border);
    gap: 10px;
    flex-shrink: 0;
  }
  .mobile-footer .add-btn { flex: 1; }

  /* 予定ブロックをモバイル向けに調整 */
  .event-content {
    flex-direction: column;
    align-items: flex-start;
    gap: 2px;
    padding: 6px 10px;
  }
  .event-name {
    font-size: 14px;
  }
  .event-time-range {
    font-size: 11px;
  }
  .event-emoji {
    width: 40px;
    font-size: 18px;
  }
  /* 編集ボタンと写真ボタンを小さく */
  .edit-menu-btn,
  .photo-spacer {
    width: 24px;
  }
  .photo-btn { width: 28px; }
  .photo-btn-icon { width: 26px; height: 26px; font-size: 12px; }
  /* 時間ラベルも小さく */
  .hour-label { font-size: 13px !important; }
  /* タイムラインの左余白を縮小 */
  :root { --time-w: 52px; }
}

/* PCではモバイル専用要素を非表示 */
@media (min-width: 769px) {
  .timeline-wrap::before,
  .timeline-wrap::after { height: 40px; }
  .mobile-tabs   { display: none; }
  .mobile-footer { display: none; }
  .mobile-date-nav { display: none; }
  .mobile-content { display: contents; }
  .tab-timeline  { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  .tab-timeline.hidden { display: none; }
  .tab-nowNext   { display: none !important; }
}
</style>
</head>
<body>

<!-- ══ ログイン画面 ══ -->
<div id="loginScreen">

<script>
// ═══════════════════════════════════
// 定数・ユーティリティ
// ═══════════════════════════════════
const START_HOUR = 6, END_HOUR = 23, HOUR_H = 80;
const YOUBI       = ['日ようび','月ようび','火ようび','水ようび','木ようび','金ようび','土ようび'];
const YOUBI_SHORT = ['日','月','火','水','木','金','土'];
const MONTHS      = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const EMOJI_CATEGORIES = [
  { label: '🍴 たべもの', emojis: ['🍳','🍱','🍜','🍙','🥗','🍰','🍕','🥤','🧃','🍎','🍞','🥣'] },
  { label: '🏃 うごき・そと', emojis: ['🚶','🏃','⚽','🤸','🏊','🚴','🛝','🌳','🌸','🏕️','🎪','🤾'] },
  { label: '👫 ともだち・かぞく', emojis: ['👫','🤝','😄','🎉','🫂','👨‍👩‍👦','🎈','💬','🪁','🎠'] },
  { label: '🌈 りょういく・サポート', emojis: ['🌈','⭐','🧩','🎯','💪','🌟','🦋','🌱','🤲','🪄'] },
  { label: '📚 べんきょう', emojis: ['🎒','📝','📚','🎨','🖍️','✏️','🔬','📖','🖊️','📐'] },
  { label: '🚗 おでかけ', emojis: ['🚗','🚌','🎬','🛒','🏥','🚂','✈️','🛳️','🎡','🏪'] },
  { label: '🏠 いえのこと', emojis: ['🛁','🪥','😴','🧹','🎮','🎵','📺','🛌','🧺','🪴'] },
  { label: '🐾 どうぶつ・その他', emojis: ['🐶','🐱','🐰','🐸','🦁','🐧','🐠','🐥','🌙','❤️'] },
];

const timeToMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
const minToPx   = m => (m - START_HOUR*60) / 60 * HOUR_H;
const pad2      = n => String(n).padStart(2,'0');
const dateStr   = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

function formatAmPm(t) {
  const [h,m] = t.split(':').map(Number);
  const h12 = h === 0 ? 12 : h > 12 ? h-12 : h;
  return `${h < 12 ? 'AM' : 'PM'} ${h12}:${pad2(m)}`;
}

// ═══════════════════════════════════
// 状態管理
// ═══════════════════════════════════
const realToday  = new Date();
var selectedDate = new Date();
var calViewYear  = realToday.getFullYear();
var calViewMonth = realToday.getMonth();

// 全予定（Firestoreから読み込む）
var allEvents = window._events || [];

// Firestoreへ保存
function saveData() {
  window._events = allEvents;
  if (window.saveToFirestore) window.saveToFirestore();
}

function getEventsForDate(date) {
  const dow  = date.getDay();
  const dStr = dateStr(date);
  return allEvents
    .filter(ev => {
      if (ev.onceDate) return ev.onceDate === dStr;
      if (!(ev.days || []).includes(dow)) return false;
      // 期間フィルター
      if (ev.repeatFrom && dStr < ev.repeatFrom) return false;
      if (ev.repeatTo   && dStr > ev.repeatTo)   return false;
      return true;
    })
    .sort((a,b) => timeToMin(a.start) - timeToMin(b.start));
}

function hasEventsOn(date) {
  return getEventsForDate(date).length > 0;
}

var events = [];

// ═══════════════════════════════════
// カレンダー描画
// ═══════════════════════════════════
function buildMonthCalendar() {
  document.getElementById('monthTitle').textContent =
    `${calViewYear}年 ${MONTHS[calViewMonth]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // 曜日ヘッダー
  YOUBI_SHORT.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i===0?' sun': i===6?' sat':'');
    el.textContent = d;
    grid.appendChild(el);
  });

  // 月の1日の曜日
  const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
  const lastDate = new Date(calViewYear, calViewMonth+1, 0).getDate();
  const prevLast = new Date(calViewYear, calViewMonth, 0).getDate();

  const todayStr = dateStr(realToday);
  const selStr   = dateStr(selectedDate);

  // 前月の余り
  for (let i = 0; i < firstDay; i++) {
    const d = prevLast - firstDay + 1 + i;
    const cell = document.createElement('div');
    cell.className = 'cal-day other-month';
    cell.textContent = d;
    grid.appendChild(cell);
  }

  // 当月
  for (let d = 1; d <= lastDate; d++) {
    const thisDate = new Date(calViewYear, calViewMonth, d);
    const tStr = dateStr(thisDate);
    const dow  = thisDate.getDay();
    let cls = 'cal-day';
    if (tStr === todayStr) cls += ' is-today';
    else if (tStr === selStr) cls += ' is-selected';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (hasEventsOn(thisDate)) cls += ' has-events';

    const cell = document.createElement('div');
    cell.className = cls;
    cell.textContent = d;
    cell.addEventListener('click', () => selectDate(thisDate));
    grid.appendChild(cell);
  }

  // 次月の余り
  const total = firstDay + lastDate;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remain; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day other-month';
    cell.textContent = i;
    grid.appendChild(cell);
  }
}

function buildSidebarList() {
  const now      = new Date();
  const nowMin   = now.getHours() * 60 + now.getMinutes();
  const todayStr = dateStr(realToday);
  const body     = document.getElementById('sidebarEventList');
  body.innerHTML = '';

  // 今日の残り予定 + 明日以降の予定を収集（最大30日先まで）
  const items = [];
  for (let offset = 0; offset <= 30; offset++) {
    const d = new Date(realToday);
    d.setDate(realToday.getDate() + offset);
    const dStr = dateStr(d);
    const evs  = getEventsForDate(d);
    evs.forEach(ev => {
      const endMin = timeToMin(ev.end);
      // 今日は終了時刻が現在より後のものだけ、明日以降は全部
      if (offset === 0 && endMin <= nowMin) return;
      items.push({ ev, date: d, dStr });
    });
  }

  if (!items.length) {
    body.innerHTML = '<div class="sidebar-list-empty">よていはありません</div>';
    return;
  }

  let lastDateStr = '';
  items.forEach(({ ev, date, dStr }) => {
    // 日付セパレーター
    if (dStr !== lastDateStr) {
      lastDateStr = dStr;
      const sep = document.createElement('div');
      const isToday = dStr === todayStr;
      sep.style.cssText = 'font-size:10px;font-weight:900;color:var(--muted);padding:6px 0 4px;letter-spacing:0.04em;';
      sep.textContent   = isToday
        ? 'きょう'
        : MONTHS[date.getMonth()] + date.getDate() + '日 ' + YOUBI_SHORT[date.getDay()] + 'ようび';
      body.appendChild(sep);
    }

    const item = document.createElement('div');
    item.className = 'sidebar-event-item';
    item.innerHTML = `
      <div class="sidebar-event-emoji">${ev.emoji}</div>
      <div class="sidebar-event-info">
        <div class="sidebar-event-name">${ev.name}</div>
        <div class="sidebar-event-meta">${formatAmPm(ev.start)} 〜 ${formatAmPm(ev.end)}</div>
      </div>
      <div class="sidebar-event-btns">
        <button class="sidebar-event-edit" title="編集">✏️</button>
        <button class="sidebar-event-del"  title="削除">🗑️</button>
      </div>
    `;
    item.querySelector('.sidebar-event-edit').addEventListener('click', () => {
      selectDate(date);
      openEditForm(ev);
    });
    item.querySelector('.sidebar-event-del').addEventListener('click', () => {
      if (confirm(`「${ev.name}」を削除しますか？`)) {
        deleteEvent(ev);
        buildSidebarList();
      }
    });
    body.appendChild(item);
  });
}

function selectDate(date) {
  selectedDate = new Date(date);
  events = getEventsForDate(selectedDate);
  updateHeader();
  updateWhosHome();
  buildTimeline();
  buildMonthCalendar();
  if (dateStr(selectedDate) === dateStr(realToday)) {
    updateNowLine();
  } else {
    document.getElementById('timelineScroll').scrollTo({ top: 0 });
  }
}

// ═══════════════════════════════════
// ヘッダー更新
// ═══════════════════════════════════
function updateHeader() {
  document.getElementById('mainDate').textContent  =
    MONTHS[selectedDate.getMonth()] + selectedDate.getDate() + '日';
  document.getElementById('mainYoubi').textContent = YOUBI[selectedDate.getDay()];
}

// ═══════════════════════════════════
// タイムライン構築
// ═══════════════════════════════════
function buildTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  tl.style.height = ((END_HOUR - START_HOUR) * HOUR_H + 160) + 'px';

  for (let h = START_HOUR; h <= END_HOUR; h++) {
    const row = document.createElement('div');
    row.className = 'hour-row';
    row.style.cssText = `top:${(h-START_HOUR)*HOUR_H}px; height:${HOUR_H}px;`;
    const h12 = h === 0 ? 12 : h > 12 ? h-12 : h;
    row.innerHTML = `<div class="hour-label">${h12}</div><div class="hour-tick"></div>`;
    tl.appendChild(row);
  }

  events.forEach((ev, i) => {
    const top    = minToPx(timeToMin(ev.start));
    const height = Math.max((timeToMin(ev.end) - timeToMin(ev.start)) / 60 * HOUR_H, 60);

    const wrapper = document.createElement('div');
    wrapper.className = 'event-wrapper';
    wrapper.id = `ev-${i}`;
    wrapper.style.cssText = `top:${top}px; height:${height}px;`;

    const rightCol = ev.photos > 0
      ? `<button class="photo-btn" data-index="${i}"><div class="photo-btn-icon">📷</div><div class="photo-btn-count">${ev.photos}</div></button>`
      : `<div class="photo-spacer"></div>`;
    const editBtn =
      `<button class="edit-menu-btn" data-index="${i}"><span></span><span></span><span></span></button>`;

    wrapper.innerHTML = `
      <div class="event-block">
        <div class="event-emoji">${ev.emoji}</div>
        <div class="event-content">
          <div class="event-name">${ev.name}</div>
          <div class="event-time-range">${formatAmPm(ev.start)} 〜 ${formatAmPm(ev.end)}</div>
        </div>
      </div>
      ${rightCol}${editBtn}
    `;
    tl.appendChild(wrapper);
  });

  // ままのひとりじかん帯（登録済みスロットをすべて表示）
  if (dateStr(selectedDate) === dateStr(realToday)) {
    window._mamaCardState.slots.forEach(slot => {
      if (!slot || !slot.startTime || !slot.endTime) return;
      const startMin = slot.startTime.getHours() * 60 + slot.startTime.getMinutes();
      const endMin   = slot.endTime.getHours()   * 60 + slot.endTime.getMinutes();
      const topPx    = minToPx(Math.max(startMin, START_HOUR * 60));
      const botPx    = minToPx(Math.min(endMin,   END_HOUR  * 60));
      if (botPx <= topPx) return;
      const band = document.createElement('div');
      band.style.cssText = `position:absolute;right:0;top:${topPx}px;height:${Math.max(botPx-topPx,20)}px;width:24px;background:#FFD6EC;border-left:2px solid #CC3377;border-radius:0 6px 6px 0;display:flex;align-items:center;justify-content:center;font-size:11px;z-index:5;`;
      band.textContent = '🔕';
      tl.appendChild(band);
    });
  }

  // 現在時刻ライン（今日だけ）
  if (dateStr(selectedDate) === dateStr(realToday)) {
    const nowEl = document.createElement('div');
    nowEl.className = 'now-wrapper';
    nowEl.id = 'nowWrapper';
    nowEl.innerHTML = `<div class="now-inner"><div class="now-dot"></div><div class="now-line"></div></div>`;
    tl.appendChild(nowEl);
  }

  tl.addEventListener('click', e => {
    const pb = e.target.closest('.photo-btn');
    if (pb) openPhotoPopup(parseInt(pb.dataset.index));
    const eb = e.target.closest('.edit-menu-btn');
    if (eb) openEditMenu(parseInt(eb.dataset.index));
  });
}

function updateNowLine() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const totalMin = h*60 + m + s/60;

  // ヘッダー時計（常に今の時刻）
  const h12  = h === 0 ? 12 : h > 12 ? h-12 : h;
  document.getElementById('mainClock').textContent = `${h < 12 ? 'AM' : 'PM'} ${h12}:${pad2(m)}`;

  // いま・つぎパネル（今日のみ更新）
  if (dateStr(selectedDate) === dateStr(realToday)) {
    updateNowNext(totalMin);
  }

  // 今日のみラインを動かす
  if (dateStr(selectedDate) !== dateStr(realToday)) return;

  const nowEl = document.getElementById('nowWrapper');
  if (!nowEl) return;
  const px = Math.max(0, Math.min((END_HOUR-START_HOUR)*HOUR_H, minToPx(totalMin)));
  nowEl.style.top = px + 'px';

  events.forEach((ev, i) => {
    const el = document.getElementById(`ev-${i}`);
    if (!el) return;
    const s = timeToMin(ev.start), e = timeToMin(ev.end);
    el.classList.toggle('is-past', e < totalMin);
    el.classList.toggle('is-now',  s <= totalMin && e >= totalMin);
  });

  autoScroll(px);
}

// ── いま・つぎパネル更新 ──
const CIRC = 2 * Math.PI * 54; // r=54

function updateNowNext(totalMin) {
  const todayEvs = getEventsForDate(realToday);
  const panel = document.getElementById('nowNextPanel');

  // 今の予定・次の予定を特定
  let currentEv = null, nextEv = null, segEnd = null, segTotal = null, isJiyu = false;

  for (let i = 0; i < todayEvs.length; i++) {
    const ev  = todayEvs[i];
    const s   = timeToMin(ev.start);
    const e   = timeToMin(ev.end);
    const ns  = todayEvs[i+1] ? timeToMin(todayEvs[i+1].start) : null;

    if (totalMin < s) {
      // まだ最初の予定前 → じゆう
      if (!currentEv) {
        currentEv = null; isJiyu = true;
        segEnd    = s;
        segTotal  = s - (i === 0 ? 0 : timeToMin(todayEvs[i-1].end));
        nextEv    = ev;
      }
      break;
    }
    if (totalMin >= s && totalMin < e) {
      // 予定中
      currentEv = ev; isJiyu = false;
      segEnd    = e;
      segTotal  = e - s;
      nextEv    = todayEvs[i+1] || null;
      break;
    }
    if (ns !== null && totalMin >= e && totalMin < ns) {
      // 予定と予定の間（じゆう）
      currentEv = null; isJiyu = true;
      segEnd    = ns;
      segTotal  = ns - e;
      nextEv    = todayEvs[i+1];
      break;
    }
    // 最後の予定が終わった後
    if (i === todayEvs.length - 1 && totalMin >= e) {
      currentEv = null; isJiyu = true;
      segEnd    = null; segTotal = null;
      nextEv    = null;
    }
  }

  // 残り分
  const remMin = segEnd !== null ? Math.max(0, Math.ceil(segEnd - totalMin)) : null;

  // いま（PC + モバイル + FS）
  const nowEl  = document.getElementById('nnNow');
  const nowElM = document.getElementById('nnNowMobile');
  const nowElFS= document.getElementById('nnNowFS');
  const nowText  = (isJiyu || !currentEv) ? 'じゆう' : currentEv.emoji + ' ' + currentEv.name;
  const nowClass = (isJiyu || !currentEv) ? 'nn-value is-jiyu' : 'nn-value';
  [nowEl, nowElM, nowElFS].forEach(el => { if(el){ el.textContent = nowText; el.className = nowClass; }});

  // つぎ（PC + モバイル + FS）
  const nextEl  = document.getElementById('nnNext');
  const nextElM = document.getElementById('nnNextMobile');
  const nextElFS= document.getElementById('nnNextFS');
  const nextText = nextEv ? nextEv.emoji + ' ' + nextEv.name : '—';
  [nextEl, nextElM, nextElFS].forEach(el => { if(el){ el.textContent = nextText; el.className = 'nn-value'; }});

  // タイマーラベル（共通化）
  const labelText = isJiyu
    ? 'つぎのよていが\nはじまるまで'
    : 'いまのよていが\nおわるまで';
  const labelEl  = document.getElementById('nnLabel');
  const labelElM = document.getElementById('nnLabelMobile');
  const labelElFS= document.getElementById('nnLabelFS');
  [labelEl, labelElM, labelElFS].forEach(el => { if(el) el.textContent = labelText; });

  // タイマー表示（60分固定スケール・1時間超は待機）
  const waitingEl   = document.getElementById('nnWaiting');
  const waitingElM  = document.getElementById('nnWaitingMobile');
  const circleEl    = document.getElementById('nnCircleWrap');
  const circleElM   = document.getElementById('nnCircleWrapMobile');
  const minEl       = document.getElementById('nnMin');
  const unitEl      = document.getElementById('nnUnit');
  const arc         = document.getElementById('nnArc');
  const minElM      = document.getElementById('nnMinMobile');
  const unitElM     = document.getElementById('nnUnitMobile');
  const arcM        = document.getElementById('nnArcMobile');
  const minElFS     = document.getElementById('nnMinFS');
  const unitElFS    = document.getElementById('nnUnitFS');
  const arcFS       = document.getElementById('nnArcFS');
  const waitTimeEl  = document.getElementById('nnWaitingTime');
  const waitTimeElM = document.getElementById('nnWaitingTimeMobile');

  if (remMin === null) {
    [waitingEl, waitingElM].forEach(el => { if(el) el.style.display = 'none'; });
    [circleEl, circleElM].forEach(el => { if(el) el.style.display = 'flex'; });
    [minEl, minElM, minElFS].forEach(el   => { if(el) el.textContent = '—'; });
    [unitEl, unitElM, unitElFS].forEach(el => { if(el) el.textContent = ''; });
    [arc, arcM, arcFS].forEach(el => { if(el) el.style.strokeDasharray = `0 ${CIRC}`; });

  } else if (remMin > 60) {
    [waitingEl, waitingElM].forEach(el => { if(el) el.style.display = 'block'; });
    [circleEl, circleElM].forEach(el  => { if(el) el.style.display = 'none'; });
    const h = Math.floor(remMin / 60), m = remMin % 60;
    const txt = m > 0 ? `${h}じかん${m}ふん` : `${h}じかん`;
    [waitTimeEl, waitTimeElM].forEach(el => { if(el) el.textContent = txt; });
    // FSは円タイマーで60分固定
    [minElFS].forEach(el => { if(el) el.textContent = remMin; });
    [unitElFS].forEach(el => { if(el) el.textContent = 'ふん'; });
    if (arcFS) { arcFS.style.strokeDasharray = `0 ${CIRC}`; arcFS.className = 'nn-timer-arc'; }

  } else {
    [waitingEl, waitingElM].forEach(el => { if(el) el.style.display = 'none'; });
    [circleEl, circleElM].forEach(el  => { if(el) el.style.display = 'flex'; });
    const ratio  = remMin / 60;
    const filled = CIRC * ratio;
    const arcCls = 'nn-timer-arc' + (isJiyu ? ' jiyu' : '');
    [minEl, minElM, minElFS].forEach(el   => { if(el) el.textContent = remMin; });
    [unitEl, unitElM, unitElFS].forEach(el => { if(el) el.textContent = 'ふん'; });
    [arc, arcM, arcFS].forEach(el => {
      if(el) { el.style.strokeDasharray = `${filled} ${CIRC - filled}`; el.className = arcCls; }
    });
  }
}

let userScrolled = false, scrollTimeout;

    const tab = document.createElement('button');
    tab.className = 'emoji-cat-tab' + (idx === 0 ? ' active' : '');

  grid.id = 'emojiGrid';
  picker.appendChild(grid);

    grid.innerHTML = '';

      const btn = document.createElement('button');
      btn.className = 'emoji-pick' + (em === selectedEmoji ? ' selected' : '');

      btn.onclick = () => {
        selectedEmoji = em;
        document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      };
      grid.appendChild(btn);
    });

  // 編集時は選択絵文字のカテゴリを開く
  if (editEv) {
    const catIdx = EMOJI_CATEGORIES.findIndex(c => c.emojis.includes(editEv.emoji));

      currentCatIdx = catIdx;
      document.querySelectorAll('.emoji-cat-tab').forEach((t,i) =>
        t.classList.toggle('active', i === catIdx));
    }

  // 時間セレクト
  ['fStartH','fEndH'].forEach(id => {

    sel.innerHTML = '';
    for (let i = 1; i <= 12; i++) sel.innerHTML += `<option>${i}</option>`;

      sel.innerHTML += `<option value="${m}">${pad2(m)}</option>`);
  });

  // 曜日
  const dc = document.getElementById('dayChecks');
  dc.innerHTML = '';
  YOUBI_SHORT.forEach((d, i) => {
    const checked = editEv && editEv.days && editEv.days.includes(i);
    const lbl = document.createElement('label');
    lbl.className = 'day-check-label' + (checked ? ' checked' : '');
    lbl.innerHTML = `<input type="checkbox" value="${i}"${checked ? ' checked' : ''}>${d}`;
    lbl.querySelector('input').addEventListener('change', e =>
      lbl.classList.toggle('checked', e.target.checked));
    dc.appendChild(lbl);
  });

  // くりかえしトグル
  document.querySelectorAll('input[name="repeatMode"]').forEach(r => {
    r.addEventListener('change', () => {
      const weekly = document.querySelector('input[name="repeatMode"]:checked').value === 'weekly';
      document.getElementById('weeklySection').style.display = weekly ? '' : 'none';
      document.getElementById('onceSection').style.display   = weekly ? 'none' : '';
      document.getElementById('repeatBtn').classList.toggle('checked', weekly);
      document.getElementById('onceBtn').classList.toggle('checked', !weekly);
    });
  });

    document.querySelector('input[name="repeatMode"][value="weekly"]').checked = true;
    document.querySelector('input[name="repeatMode"]').dispatchEvent(new Event('change'));
  };
  document.getElementById('onceBtn').onclick = () => {
    document.querySelector('input[name="repeatMode"][value="once"]').checked = true;
    document.querySelector('input[name="repeatMode"]').dispatchEvent(new Event('change'));

  const isOnce = editEv && !!editEv.onceDate;
  document.querySelector('input[name="repeatMode"][value="weekly"]').checked = !isOnce;
  document.querySelector('input[name="repeatMode"][value="once"]').checked   = isOnce;

  document.getElementById('onceSection').style.display   = isOnce ? '' : 'none';

  document.getElementById('onceBtn').classList.toggle('checked', isOnce);

  // 日付
  const defDate = editEv?.onceDate || dateStr(selectedDate);
  document.getElementById('fDate').value = defDate;

  // 時間プリセット
  function setTimeParts(t, ampmId, hId, mId) {
    if (!t) return;
    const [h24,m] = t.split(':').map(Number);
    const h12 = h24 === 0 ? 12 : h24 > 12 ? h24-12 : h24;
    document.getElementById(ampmId).value = h24 < 12 ? 'AM' : 'PM';
    document.getElementById(hId).value    = h12;
    document.getElementById(mId).value    = m;
  }
  setTimeParts(editEv?.start, 'fStartAmpm','fStartH','fStartM');
  setTimeParts(editEv?.end,   'fEndAmpm',  'fEndH',  'fEndM');

  document.getElementById('fAlarmStart').value  = editEv?.alarmStart ?? 5;
  document.getElementById('fAlarmEnd').value    = editEv?.alarmEnd   ?? 5;
  document.getElementById('fRepeatFrom').value  = editEv?.repeatFrom || '';
  document.getElementById('fRepeatTo').value    = editEv?.repeatTo   || '';
  document.getElementById('fName').value = editEv?.name || '';
  document.getElementById('addOverlay').classList.add('open');
}

function ampmTo24(ampm, h, m) {
  let h24 = parseInt(h);
  if (ampm === 'AM' && h24 === 12) h24 = 0;
  if (ampm === 'PM' && h24 !== 12) h24 += 12;
  return `${pad2(h24)}:${pad2(m)}`;
}

function submitEvent() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('よていのなまえを入れてください'); return; }

  const start = ampmTo24(document.getElementById('fStartAmpm').value,
    document.getElementById('fStartH').value, document.getElementById('fStartM').value);
  const end   = ampmTo24(document.getElementById('fEndAmpm').value,
    document.getElementById('fEndH').value,   document.getElementById('fEndM').value);

  const mode = document.querySelector('input[name="repeatMode"]:checked').value;
  let newEv;
  const alarmStart  = parseInt(document.getElementById('fAlarmStart').value);
  const alarmEnd    = parseInt(document.getElementById('fAlarmEnd').value);
  const repeatFrom  = document.getElementById('fRepeatFrom').value || null;
  const repeatTo    = document.getElementById('fRepeatTo').value   || null;

  if (mode === 'weekly') {
    const days = [...document.querySelectorAll('#dayChecks input:checked')].map(el => parseInt(el.value));
    if (!days.length) { alert('曜日を選んでください'); return; }
    newEv = { name, start, end, emoji: selectedEmoji, days, photos: 0, alarmStart, alarmEnd, repeatFrom, repeatTo };
  } else {
    const dateVal = document.getElementById('fDate').value;
    if (!dateVal) { alert('日にちを選んでください'); return; }
    newEv = { name, start, end, emoji: selectedEmoji, days: [], onceDate: dateVal, photos: 0, alarmStart, alarmEnd };
  }

  // 編集中なら元のイベントを置き換え、新規なら追加
  const editEv = editingIndex >= 0 ? events[editingIndex] : null;
  if (editEv) {
    const idx = allEvents.findIndex(e =>
      e.name === editEv.name && e.start === editEv.start && e.end === editEv.end &&
      JSON.stringify(e.days) === JSON.stringify(editEv.days) &&
      (e.onceDate || '') === (editEv.onceDate || '')
    );
    if (idx >= 0) allEvents.splice(idx, 1, newEv);
    else allEvents.push(newEv);
  } else {
    allEvents.push(newEv);
  }

  editingIndex = -1;
  saveData();
  document.getElementById('addOverlay').classList.remove('open');
  events = getEventsForDate(selectedDate);
  buildTimeline(); buildMonthCalendar();
  buildSidebarList();
  updateNowLine();
}

function initMamaSelects() {
  ['mamaStartH','mamaEndH'].forEach(id => {
    const sel = document.getElementById(id);

      for (let h = 1; h <= 12; h++) sel.add(new Option(h, h));
    }
  });
  ['mamaStartM','mamaEndM'].forEach(id => {
    const sel = document.getElementById(id);
    if (sel && sel.options.length === 0) {
      ['00','05','10','15','20','25','30','35','40','45','50','55'].forEach(m => sel.add(new Option(m, m)));
    }
  });
}

function setTimePicker(prefix, h24, m) {
  const ampm = h24 < 12 ? 'AM' : 'PM';
  const h12  = h24 === 0 ? 12 : h24 > 12 ? h24 - 12 : h24;
  // 分を5分単位に丸める
  const m5   = Math.round(m / 5) * 5 % 60;
  document.getElementById(prefix + 'Ampm').value = ampm;
  document.getElementById(prefix + 'H').value    = h12;
  document.getElementById(prefix + 'M').value    = String(m5).padStart(2, '0');
}

function closeMamaCard() {
  document.getElementById('mamaCardOverlay').classList.remove('open');
}

function applyMamaCard() {
  const sh = parseInt(document.getElementById('mamaStartH').value);
  const sm = parseInt(document.getElementById('mamaStartM').value);
  const sa = document.getElementById('mamaStartAmpm').value;
  const eh = parseInt(document.getElementById('mamaEndH').value);
  const em = parseInt(document.getElementById('mamaEndM').value);
  const ea = document.getElementById('mamaEndAmpm').value;

  const s24 = (sa === 'AM' ? (sh === 12 ? 0 : sh) : (sh === 12 ? 12 : sh + 12));
  const e24 = (ea === 'AM' ? (eh === 12 ? 0 : eh) : (eh === 12 ? 12 : eh + 12));

  if (e24 * 60 + em <= s24 * 60 + sm) {
    alert('おわりの時間は、はじまりより後にしてください'); return;
  }

  closeMamaCard();

  const idx = window._mamaCardState._pendingCard;
  const startTime = new Date(); startTime.setHours(s24, sm, 0, 0);
  const endTime   = new Date(); endTime.setHours(e24, em, 0, 0);
  window._mamaCardState.slots[idx] = { startTime, endTime };

  window.updateMamaCards();
  window.updateMamaTimer();
  buildTimeline();
  saveMamaCardLocal();
}

function updateMamaCards() {
  for (let i = 0; i < 3; i++) {
    const btn  = document.getElementById('mamaCard' + i);
    if (!btn) continue;
    const slot = window._mamaCardState.slots[i];
    if (!slot || !slot.startTime) {
      btn.className = 'mama-card-btn';
      btn.disabled  = false;
    } else {
      btn.className = 'mama-card-btn used';
      btn.disabled  = false;
    }
  }
}

function updateMamaTimer() {
  const wrap = document.getElementById('mamaTimerWrap');
  if (!wrap) return;
  const now = new Date();

  // 現在進行中のスロットを探す
  const active = window._mamaCardState.slots.find(s =>
    s && s.startTime && s.endTime && now >= s.startTime && now < s.endTime
  );

  if (!active) {
    wrap.style.display = 'none';
    return;
  }

  wrap.style.display = 'flex';
  const remMin   = Math.ceil((active.endTime - now) / 60000);
  const totalMin = Math.round((active.endTime - active.startTime) / 60000);
  const CIRC     = 2 * Math.PI * 54;
  const filled   = CIRC * Math.min(remMin / Math.max(totalMin, 1), 1);
  document.getElementById('mamaMin').textContent = remMin;
  const arc = document.getElementById('mamaArc');
  if (arc) arc.style.strokeDasharray = `${filled} ${CIRC - filled}`;
}

document.getElementById('mamaCardOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('mamaCardOverlay')) closeMamaCard();
});

// _initAppから呼べるようにwindowに公開
window.updateMamaCards = updateMamaCards;
window.updateMamaTimer = updateMamaTimer;

function toggleHome(who) {

// アラーム音
// ═══════════════════════════════════
let _audioCtx = null;
function _getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
function _tone(freq, start, dur, vol, type) {
  const c = _getAudioCtx();
  const osc = c.createOscillator();
  const g   = c.createGain();
  osc.connect(g); g.connect(c.destination);
  osc.type = type || 'triangle';
  osc.frequency.value = freq;
  const t = c.currentTime;
  g.gain.setValueAtTime(0, t + start);
  g.gain.linearRampToValueAtTime(vol, t + start + 0.03);
  g.gain.setValueAtTime(vol, t + start + dur * 0.55);
  g.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
  osc.start(t + start);
  osc.stop(t + start + dur + 0.05);
}
// パターンC：ポップなファンファーレ（開始前）
function playAlarmStart() {
  _tone(784,  0.00, 0.28, 0.65, 'triangle');
  _tone(880,  0.32, 0.28, 0.65, 'triangle');
  _tone(988,  0.64, 0.28, 0.65, 'triangle');
  _tone(1047, 0.96, 0.45, 0.65, 'triangle');
  _tone(1047, 1.50, 0.45, 0.60, 'triangle');
  _tone(1047, 2.05, 2.2,  0.55, 'triangle');
}
// パターンA下降版：3音下がって伸びる（終了前）
function playAlarmEnd() {
  _tone(1047, 0.00, 0.35, 0.60, 'triangle');
  _tone(784,  0.40, 0.35, 0.60, 'triangle');
  _tone(523,  0.80, 2.5,  0.55, 'triangle');
}

const _firedAlarms = new Set();
function checkAlarms() {
  if (!window._appReady) return;
  const now = new Date();
  const dStr = dateStr(now);
  const totalMin = now.getHours() * 60 + now.getMinutes();
  const todayEvs = allEvents.filter(ev =>
    ev.onceDate ? ev.onceDate === dStr : (ev.days || []).includes(now.getDay())
  );
  todayEvs.forEach(ev => {
    const startMin = timeToMin(ev.start);
    const endMin   = ev.end ? timeToMin(ev.end) : null;
    if (ev.alarmStart > 0) {
      const key = `${dStr}_${ev.name}_start`;
      if (totalMin === startMin - ev.alarmStart && !_firedAlarms.has(key)) {
        _firedAlarms.add(key); playAlarmStart();
      }
    }
    if (ev.alarmEnd > 0 && endMin !== null) {
      const key = `${dStr}_${ev.name}_end`;
      if (totalMin === endMin - ev.alarmEnd && !_firedAlarms.has(key)) {
        _firedAlarms.add(key); playAlarmEnd();
      }
    }
  });
}

function exportSchedule() {
  // デフォルト：今日
  document.getElementById('exportFrom').value = dateStr(selectedDate);
  document.getElementById('exportTo').value   = dateStr(selectedDate);
  document.getElementById('exportOverlay').classList.add('open');

function setExportRange(days) {
  const to   = new Date();
  const from = new Date();
  from.setDate(from.getDate() - days);
  document.getElementById('exportFrom').value = dateStr(from);
  document.getElementById('exportTo').value   = dateStr(to);
}

function doExport() {
  const fromStr = document.getElementById('exportFrom').value;
  const toStr   = document.getElementById('exportTo').value;
  if (!fromStr || !toStr) { alert('日付を選んでください'); return; }

  const YOUBI_JP = ['日','月','火','水','木','金','土'];
  function durStr(start, end) {
    const diff = timeToMin(end) - timeToMin(start);
    if (diff <= 0) return '';
    const h = Math.floor(diff / 60), min = diff % 60;
    if (h > 0 && min > 0) return `（${h}時間${min}分）`;
    if (h > 0) return `（${h}時間）`;
    return `（${min}分）`;
  }

  // 日付を1日ずつ走査
  const from = new Date(fromStr);
  const to   = new Date(toStr);
  let text = `【よていデータ】${fromStr} 〜 ${toStr}\n`;

  for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
    const evs = getEventsForDate(new Date(d));
    if (!evs.length) continue;
    const m = d.getMonth() + 1, day = d.getDate(), w = YOUBI_JP[d.getDay()];
    text += `\n■ ${m}月${day}日（${w}）\n`;
    evs.forEach(ev => {
      text += `- ${ev.name}　${formatAmPm(ev.start)}〜${formatAmPm(ev.end)}${durStr(ev.start, ev.end)}\n`;
    });
  }

  document.getElementById('exportOverlay').classList.remove('open');

  navigator.clipboard.writeText(text).then(() => {
    alert('コピーしました！\nClaudeに貼り付けて分析してもらえます。');
  }).catch(() => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:center;justify-content:center;';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:16px;padding:24px;width:90%;max-width:480px;max-height:80vh;overflow-y:auto;">
        <div style="font-size:15px;font-weight:900;margin-bottom:12px;">📋 よていデータ（コピーしてください）</div>
        <textarea readonly style="width:100%;height:240px;border:1.5px solid #E4E4E4;border-radius:8px;padding:10px;font-size:12px;font-family:inherit;resize:none;">${text}</textarea>
        <button onclick="this.closest('div').parentElement.remove()" style="margin-top:12px;width:100%;padding:10px;border-radius:10px;border:none;background:#2B6EFF;color:#fff;font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;">とじる</button>
      </div>`;
    document.body.appendChild(overlay);
  });
}

// 日付移動（モバイル用）
function moveDate(offset) {
  if (offset === 0) {
    selectedDate = new Date(realToday);
  } else {
    const d = new Date(selectedDate);
    d.setDate(d.getDate() + offset);
    selectedDate = d;
  }
  events = getEventsForDate(selectedDate);
  updateHeader();
  updateWhosHome();
  buildTimeline();
  buildMonthCalendar();
  buildSidebarList();
  if (dateStr(selectedDate) === dateStr(realToday)) {
    updateNowLine();
  } else {
    document.getElementById('timelineScroll').scrollTo({ top: 0 });
  }
}
