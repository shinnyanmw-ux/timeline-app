<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きょうのじかん</title>
<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyAkw1ZOMeJDP8TMW04JH_EUjD6WE9qxkNU",
  authDomain: "child-tracker-2a36c.firebaseapp.com",
  databaseURL: "https://child-tracker-2a36c-default-rtdb.firebaseio.com",
  projectId: "child-tracker-2a36c",
  storageBucket: "child-tracker-2a36c.firebasestorage.app",
  messagingSenderId: "104834828543",
  appId: "1:104834828543:web:d1f0f88ee30018d28024ca"
};

const app      = initializeApp(firebaseConfig);
const db       = getFirestore(app);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();
const DATA_REF = doc(db, 'timeline', 'appData');

// ── ログイン・ログアウト ──
window.loginWithGoogle = async function() {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) { console.error('login error:', e); }
};
window.logoutGoogle = async function() {
  await signOut(auth);
};

// ── 認証状態の監視 ──
onAuthStateChanged(auth, user => {
  const loginScreen = document.getElementById('loginScreen');
  const appScreen   = document.getElementById('appScreen');
  if (user) {
    // ログイン済み → アプリ表示
    loginScreen.style.display = 'none';
    appScreen.style.display   = 'flex';
    document.getElementById('authUserName').textContent = user.displayName || user.email;
    // データ読み込み
    loadData();
  } else {
    // 未ログイン → ログイン画面
    loginScreen.style.display = 'flex';
    appScreen.style.display   = 'none';
  }
});

// Firestoreへの保存
window.saveToFirestore = async function() {
  try {
    await setDoc(DATA_REF, {
      extraEvents:     window._extraEvents,
      baseOverrides:   window._baseOverrides,
      deletedBaseKeys: window._deletedBaseKeys,
      updatedAt:       Date.now()
    });
  } catch(e) { console.error('save error:', e); }
};

// ── データ読み込み＆リアルタイム同期 ──
let unsubscribe = null;
function loadData() {
  if (unsubscribe) unsubscribe(); // 既存リスナー解除
  unsubscribe = onSnapshot(DATA_REF, (snap) => {
    if (snap.exists()) {
      const d = snap.data();
      window._extraEvents     = d.extraEvents     || [];
      window._baseOverrides   = d.baseOverrides   || {};
      window._deletedBaseKeys = d.deletedBaseKeys || [];
    } else {
      window._extraEvents     = [];
      window._baseOverrides   = {};
      window._deletedBaseKeys = [];
    }
    if (window._appReady) {
      window._syncFromFirestore();
    } else {
      // _initAppが定義されるまで待つ
      const tryInit = () => {
        if (typeof window._initApp === 'function') {
          window._initApp();
        } else {
          setTimeout(tryInit, 50);
        }
      };
      tryInit();
    }
  }, e => {
    console.error('sync error:', e);
    window._extraEvents     = [];
    window._baseOverrides   = {};
    window._deletedBaseKeys = [];
    const tryInit = () => {
      if (typeof window._initApp === 'function') window._initApp();
      else setTimeout(tryInit, 50);
    };
    tryInit();
  });
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

:root {
  --bg:           #F7F6F3;
  --panel-bg:     #FFFFFF;
  --border:       #E4E4E4;
  --text:         #111111;
  --muted:        #AAAAAA;
  --block-bg:     #EEEAE1;
  --block-border: rgba(0,0,0,0.08);
  --now:          #2B6EFF;
  --now-glow:     rgba(43,110,255,0.22);
  --today-bg:     #2B6EFF;
  --selected-bg:  #E8EFFF;
  --sat:          #2B6EFF;
  --sun:          #E03535;
  --hour-h: 80px;
  --time-w: 80px;
  --sidebar-w: 280px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {

  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ══════════════════════════════
   左サイドバー
══════════════════════════════ */

  flex-shrink: 0;
  background: var(--panel-bg);
  border-right: 1.5px solid var(--border);

  flex-direction: column;
  overflow: hidden;
}

/* ── 月カレンダー ── */

  padding: 16px 12px 12px;
  border-bottom: 1px solid var(--border);
}

.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.month-nav-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: var(--muted);
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.month-nav-btn:hover { background: var(--border); }
.month-title {
  font-size: 15px;
  font-weight: 900;
  color: var(--text);
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-dow {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  text-align: center;
  padding: 2px 0 4px;
}
.cal-dow.sat { color: var(--sat); }
.cal-dow.sun { color: var(--sun); }

.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.1s;
  color: var(--text);
  position: relative;
}
.cal-day:hover { background: var(--border); }
.cal-day.other-month { color: var(--muted); }
.cal-day.is-today {
  background: var(--today-bg);
  color: #fff;
}
.cal-day.is-selected:not(.is-today) {
  background: var(--selected-bg);
  color: var(--now);
}
.cal-day.sat:not(.is-today) { color: var(--sat); }
.cal-day.sun:not(.is-today) { color: var(--sun); }
.cal-day.has-events::after {
  content: '';
  position: absolute;
  bottom: 2px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--now);
}
.cal-day.is-today.has-events::after { background: rgba(255,255,255,0.8); }

/* ── 追加ボタン ── */
.sidebar-footer {
  padding: 12px 12px 8px;
  flex-shrink: 0;
}
.add-btn {
  width: 100%;
  background: var(--now);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 12px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.15s;
}
.add-btn:hover { opacity: 0.85; }

/* ── 予定リスト（サイドバー内） ── */
.sidebar-list {

  padding: 0 12px 16px;

}

}
.sidebar-event-emoji { font-size: 16px; flex-shrink: 0; }
.sidebar-event-info  { flex: 1; min-width: 0; }
.sidebar-event-name  { font-size: 12px; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-event-meta  { font-size: 10px; color: var(--muted); margin-top: 1px; white-space: nowrap; }

}

.sidebar-event-del  { background: #FEE2E2; }

/* ══════════════════════════════
   いま・つぎパネル
══════════════════════════════ */

}

.nn-divider { width: 100%; height: 1px; background: var(--border); }

.nn-timer-section {

}
.nn-timer-svg {

.main {

  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--panel-bg);
}

/* ── メインヘッダー ── */

.timeline-wrap::before, .timeline-wrap::after {
  content: ''; position: absolute; left: 0; right: 0; height: 60px;
  z-index: 20; pointer-events: none;
}
.timeline-wrap::before { top: 0; background: linear-gradient(to bottom, var(--panel-bg), transparent); }
.timeline-wrap::after  { bottom: 0; background: linear-gradient(to top, var(--panel-bg), transparent); }

.now-wrapper {
  position: absolute; left: 24px; right: 24px;
  z-index: 50; pointer-events: none;
}
.now-inner { display: flex; align-items: center; }

  width: 11px; height: 11px; border-radius: 50%;

  margin-left: calc(var(--time-w) - 5px);

  animation: pulse 2s ease-in-out infinite;

  0%,100% { box-shadow: 0 0 0 3px var(--now-glow); }
  50%      { box-shadow: 0 0 0 6px var(--now-glow); }

.time-select:focus { border-color: var(--now); }

.emoji-pick {

.emoji-pick.selected { border-color: var(--now); background: rgba(43,110,255,0.08); }

}

.day-check-label {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 10px;
}
.day-check-label input { display: none; }
.day-check-label.checked { background: var(--now); color: #fff; border-color: var(--now); }

/* 編集メニュー */
.edit-modal-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.edit-modal-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  font-family: inherit; font-size: 16px; font-weight: 900; cursor: pointer;
  text-align: left; display: flex; align-items: center; gap: 12px;
}
.edit-modal-btn.edit   { background: var(--block-bg); color: var(--text); }
.edit-modal-btn.delete { background: #FEE2E2; color: #CC2222; }
/* ── ログイン画面 ── */
#loginScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 24px;
}
.login-box {
  background: var(--panel-bg);
  border-radius: 24px;
  border: 1.5px solid var(--border);
  padding: 48px 40px;

  flex-direction: column;
  align-items: center;

  box-shadow: 0 8px 40px rgba(0,0,0,0.08);

.login-title { font-size: 28px; font-weight: 900; color: var(--text); }
.login-sub   { font-size: 14px; color: var(--muted); font-weight: 700; }

  display: flex; align-items: center; gap: 12px;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 24px;
  font-family: inherit; font-size: 16px; font-weight: 900;
  cursor: pointer; color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);

<script>
// ═══════════════════════════════════
// 定数・ユーティリティ
// ═══════════════════════════════════
const START_HOUR = 6, END_HOUR = 23, HOUR_H = 80;
const YOUBI       = ['日ようび','月ようび','火ようび','水ようび','木ようび','金ようび','土ようび'];
const YOUBI_SHORT = ['日','月','火','水','木','金','土'];
const MONTHS      = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const EMOJIS      = ['🍳','🪥','🎒','🍱','🍜','🛁','📝','😴','⚽','🎮','📚','🎵','🏃','🛒','🎨','🐶'];

const timeToMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
const minToPx   = m => (m - START_HOUR*60) / 60 * HOUR_H;
const pad2      = n => String(n).padStart(2,'0');
const dateStr   = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

function formatAmPm(t) {
  const [h,m] = t.split(':').map(Number);
  const h12 = h === 0 ? 12 : h > 12 ? h-12 : h;
  return `${h < 12 ? 'AM' : 'PM'} ${h12}:${pad2(m)}`;
}

// ═══════════════════════════════════
// 状態管理
// ═══════════════════════════════════
const realToday  = new Date();
let selectedDate = new Date(); // 表示中の日付
let calViewYear  = realToday.getFullYear();
let calViewMonth = realToday.getMonth();

// データはFirebaseから受け取る（window._xxxにセット済み）
let extraEvents     = window._extraEvents     || [];
let baseOverrides   = window._baseOverrides   || {};
let deletedBaseKeys = window._deletedBaseKeys || [];

// Firestoreへ保存（window変数も同期）
function saveData() {
  window._extraEvents     = extraEvents;
  window._baseOverrides   = baseOverrides;
  window._deletedBaseKeys = deletedBaseKeys;
  if (window.saveToFirestore) window.saveToFirestore();
}

// 学校の終わり時間（曜日依存）
function schoolEndFor(dow) {
  return (dow === 1 || dow === 3) ? '13:30' : '14:30';
}

const baseEvents = [
  { name: 'あさごはん',             start: '7:00',  end: '7:30',  emoji: '🍳', days: [0,1,2,3,4,5,6], _base: true },
  { name: 'はみがき・くすり・きがえ', start: '7:30',  end: '7:55',  emoji: '🪥', days: [1,2,3,4,5], _base: true },
  { name: 'がっこう',               start: '8:20',  end: null,    emoji: '🎒', days: [1,2,3,4,5], _base: true, _schoolEnd: true },
  { name: 'よるごはん',             start: '18:30', end: '20:00', emoji: '🍜', days: [0,1,2,3,4,5,6], _base: true },
  { name: 'おふろ',                 start: '20:00', end: '20:30', emoji: '🛁', days: [0,1,2,3,4,5,6], _base: true },
  { name: 'しゅくだい',             start: '20:30', end: '21:00', emoji: '📝', days: [1,2,3,4,5], _base: true },
  { name: 'ねるじゅんび',           start: '21:30', end: '22:00', emoji: '😴', days: [0,1,2,3,4,5,6], _base: true },
];

// ベース予定の名前セット（削除・編集判定に使用）
const baseEventNames = new Set(baseEvents.map(ev => ev.name));
function isBaseEvent(ev) {
  return baseEventNames.has(ev.name) && !ev.onceDate;
}
  const dow  = date.getDay();
  const dStr = dateStr(date);

  const baseFiltered = baseEvents
    .map(ev => {
      const key = ev.name;
      if (deletedBaseKeys.includes(key)) return null;
      if (baseOverrides[key]) return { ...baseOverrides[key] };
      if (ev._schoolEnd) return { ...ev, end: schoolEndFor(dow) };
      return ev;
    })
    .filter(ev => ev && (ev.onceDate ? ev.onceDate === dStr : ev.days.includes(dow)));

  const extra = extraEvents.filter(ev =>
    ev.onceDate ? ev.onceDate === dStr : ev.days.includes(dow));

  return [...baseFiltered, ...extra]
    .sort((a,b) => timeToMin(a.start) - timeToMin(b.start));
}

function hasEventsOn(date) {
  return getEventsForDate(date).length > 0;
}

let events = getEventsForDate(selectedDate);

// ═══════════════════════════════════
// カレンダー描画
// ═══════════════════════════════════
function buildMonthCalendar() {
  document.getElementById('monthTitle').textContent =
    `${calViewYear}年 ${MONTHS[calViewMonth]}`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // 曜日ヘッダー
  YOUBI_SHORT.forEach((d, i) => {
    const el = document.createElement('div');
    el.className = 'cal-dow' + (i===0?' sun': i===6?' sat':'');
    el.textContent = d;
    grid.appendChild(el);
  });

  // 月の1日の曜日
  const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
  const lastDate = new Date(calViewYear, calViewMonth+1, 0).getDate();
  const prevLast = new Date(calViewYear, calViewMonth, 0).getDate();

  const todayStr = dateStr(realToday);
  const selStr   = dateStr(selectedDate);

  // 前月の余り
  for (let i = 0; i < firstDay; i++) {
    const d = prevLast - firstDay + 1 + i;
    const cell = document.createElement('div');
    cell.className = 'cal-day other-month';
    cell.textContent = d;
    grid.appendChild(cell);
  }

  // 当月
  for (let d = 1; d <= lastDate; d++) {
    const thisDate = new Date(calViewYear, calViewMonth, d);
    const tStr = dateStr(thisDate);
    const dow  = thisDate.getDay();
    let cls = 'cal-day';
    if (tStr === todayStr) cls += ' is-today';
    else if (tStr === selStr) cls += ' is-selected';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (hasEventsOn(thisDate)) cls += ' has-events';

    const cell = document.createElement('div');
    cell.className = cls;
    cell.textContent = d;
    cell.addEventListener('click', () => selectDate(thisDate));
    grid.appendChild(cell);
  }

  // 次月の余り
  const total = firstDay + lastDate;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remain; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day other-month';
    cell.textContent = i;
    grid.appendChild(cell);
  }
}

function buildSidebarList() {
  const now      = new Date();
  const nowMin   = now.getHours() * 60 + now.getMinutes();
  const todayStr = dateStr(realToday);
  const body     = document.getElementById('sidebarEventList');
  body.innerHTML = '';

  // 今日の残り予定 + 明日以降の予定を収集（最大30日先まで）
  const items = [];
  for (let offset = 0; offset <= 30; offset++) {
    const d = new Date(realToday);
    d.setDate(realToday.getDate() + offset);
    const dStr = dateStr(d);
    const evs  = getEventsForDate(d);
    evs.forEach(ev => {
      const endMin = timeToMin(ev.end);
      // 今日は終了時刻が現在より後のものだけ、明日以降は全部
      if (offset === 0 && endMin <= nowMin) return;
      items.push({ ev, date: d, dStr });
    });
  }

  if (!items.length) {
    body.innerHTML = '<div class="sidebar-list-empty">よていはありません</div>';
    return;
  }

  let lastDateStr = '';
  items.forEach(({ ev, date, dStr }) => {
    // 日付セパレーター
    if (dStr !== lastDateStr) {
      lastDateStr = dStr;
      const sep = document.createElement('div');
      const isToday = dStr === todayStr;
      sep.style.cssText = 'font-size:10px;font-weight:900;color:var(--muted);padding:6px 0 4px;letter-spacing:0.04em;';
      sep.textContent   = isToday
        ? 'きょう'
        : MONTHS[date.getMonth()] + date.getDate() + '日 ' + YOUBI_SHORT[date.getDay()] + 'ようび';
      body.appendChild(sep);
    }

    const item = document.createElement('div');
    item.className = 'sidebar-event-item';
    item.innerHTML = `
      <div class="sidebar-event-emoji">${ev.emoji}</div>
      <div class="sidebar-event-info">
        <div class="sidebar-event-name">${ev.name}</div>
        <div class="sidebar-event-meta">${formatAmPm(ev.start)} 〜 ${formatAmPm(ev.end)}</div>
      </div>
      <div class="sidebar-event-btns">
        <button class="sidebar-event-edit" title="編集">✏️</button>
        <button class="sidebar-event-del"  title="削除">🗑️</button>
      </div>
    `;
    item.querySelector('.sidebar-event-edit').addEventListener('click', () => {
      selectDate(date);
      openEditForm(ev);
    });
    item.querySelector('.sidebar-event-del').addEventListener('click', () => {
      if (confirm(`「${ev.name}」を削除しますか？`)) {
        deleteEvent(ev);
        buildSidebarList();
      }
    });
    body.appendChild(item);
  });
}

function selectDate(date) {
  selectedDate = new Date(date);
  events = getEventsForDate(selectedDate);
  updateHeader();
  buildTimeline();
  buildMonthCalendar();
  if (dateStr(selectedDate) === dateStr(realToday)) {
    updateNowLine();
  } else {
    document.getElementById('timelineScroll').scrollTo({ top: 0 });
  }
}

// ═══════════════════════════════════
// ヘッダー更新
// ═══════════════════════════════════
function updateHeader() {
  document.getElementById('mainDate').textContent  =
    MONTHS[selectedDate.getMonth()] + selectedDate.getDate() + '日';
  document.getElementById('mainYoubi').textContent = YOUBI[selectedDate.getDay()];
}

// ═══════════════════════════════════
// タイムライン構築
// ═══════════════════════════════════
function buildTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  tl.style.height = ((END_HOUR - START_HOUR) * HOUR_H + 160) + 'px';

  for (let h = START_HOUR; h <= END_HOUR; h++) {
    const row = document.createElement('div');
    row.className = 'hour-row';
    row.style.cssText = `top:${(h-START_HOUR)*HOUR_H}px; height:${HOUR_H}px;`;
    const h12 = h === 0 ? 12 : h > 12 ? h-12 : h;
    row.innerHTML = `<div class="hour-label">${h12}</div><div class="hour-tick"></div>`;
    tl.appendChild(row);
  }

  events.forEach((ev, i) => {
    const top    = minToPx(timeToMin(ev.start));
    const height = Math.max((timeToMin(ev.end) - timeToMin(ev.start)) / 60 * HOUR_H, 60);

    const wrapper = document.createElement('div');
    wrapper.className = 'event-wrapper';
    wrapper.id = `ev-${i}`;
    wrapper.style.cssText = `top:${top}px; height:${height}px;`;

    const rightCol = ev.photos > 0
      ? `<button class="photo-btn" data-index="${i}"><div class="photo-btn-icon">📷</div><div class="photo-btn-count">${ev.photos}</div></button>`
      : `<div class="photo-spacer"></div>`;
    const editBtn =
      `<button class="edit-menu-btn" data-index="${i}"><span></span><span></span><span></span></button>`;

    wrapper.innerHTML = `
      <div class="event-block">
        <div class="event-emoji">${ev.emoji}</div>
        <div class="event-content">
          <div class="event-name">${ev.name}</div>
          <div class="event-time-range">${formatAmPm(ev.start)} 〜 ${formatAmPm(ev.end)}</div>
        </div>
      </div>
      ${rightCol}${editBtn}
    `;
    tl.appendChild(wrapper);
  });

  // 現在時刻ライン（今日だけ）
  if (dateStr(selectedDate) === dateStr(realToday)) {
    const nowEl = document.createElement('div');
    nowEl.className = 'now-wrapper';
    nowEl.id = 'nowWrapper';
    nowEl.innerHTML = `<div class="now-inner"><div class="now-dot"></div><div class="now-line"></div></div>`;
    tl.appendChild(nowEl);
  }

  tl.addEventListener('click', e => {
    const pb = e.target.closest('.photo-btn');
    if (pb) openPhotoPopup(parseInt(pb.dataset.index));
    const eb = e.target.closest('.edit-menu-btn');
    if (eb) openEditMenu(parseInt(eb.dataset.index));
  });
}

// ═══════════════════════════════════
// 現在時刻更新
// ═══════════════════════════════════
function updateNowLine() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  const totalMin = h*60 + m + s/60;

  // ヘッダー時計（常に今の時刻）
  const h12  = h === 0 ? 12 : h > 12 ? h-12 : h;
  document.getElementById('mainClock').textContent = `${h < 12 ? 'AM' : 'PM'} ${h12}:${pad2(m)}`;

  // いま・つぎパネル（今日のみ更新）
  if (dateStr(selectedDate) === dateStr(realToday)) {
    updateNowNext(totalMin);
  }

  // 今日のみラインを動かす
  if (dateStr(selectedDate) !== dateStr(realToday)) return;

  const nowEl = document.getElementById('nowWrapper');
  if (!nowEl) return;
  const px = Math.max(0, Math.min((END_HOUR-START_HOUR)*HOUR_H, minToPx(totalMin)));
  nowEl.style.top = px + 'px';

  events.forEach((ev, i) => {
    const el = document.getElementById(`ev-${i}`);
    if (!el) return;
    const s = timeToMin(ev.start), e = timeToMin(ev.end);
    el.classList.toggle('is-past', e < totalMin);
    el.classList.toggle('is-now',  s <= totalMin && e >= totalMin);
  });

  autoScroll(px);
}

// ── いま・つぎパネル更新 ──
const CIRC = 2 * Math.PI * 54; // r=54

function updateNowNext(totalMin) {
  const todayEvs = getEventsForDate(realToday);
  const panel = document.getElementById('nowNextPanel');

  // 今の予定・次の予定を特定
  let currentEv = null, nextEv = null, segEnd = null, segTotal = null, isJiyu = false;

  for (let i = 0; i < todayEvs.length; i++) {
    const ev  = todayEvs[i];
    const s   = timeToMin(ev.start);
    const e   = timeToMin(ev.end);
    const ns  = todayEvs[i+1] ? timeToMin(todayEvs[i+1].start) : null;

    if (totalMin < s) {
      // まだ最初の予定前 → じゆう
      if (!currentEv) {
        currentEv = null; isJiyu = true;
        segEnd    = s;
        segTotal  = s - (i === 0 ? 0 : timeToMin(todayEvs[i-1].end));
        nextEv    = ev;
      }
      break;
    }
    if (totalMin >= s && totalMin < e) {
      // 予定中
      currentEv = ev; isJiyu = false;
      segEnd    = e;
      segTotal  = e - s;
      nextEv    = todayEvs[i+1] || null;
      break;
    }
    if (ns !== null && totalMin >= e && totalMin < ns) {
      // 予定と予定の間（じゆう）
      currentEv = null; isJiyu = true;
      segEnd    = ns;
      segTotal  = ns - e;
      nextEv    = todayEvs[i+1];
      break;
    }
    // 最後の予定が終わった後
    if (i === todayEvs.length - 1 && totalMin >= e) {
      currentEv = null; isJiyu = true;
      segEnd    = null; segTotal = null;
      nextEv    = null;
    }
  }

  // 残り分
  const remMin = segEnd !== null ? Math.max(0, Math.ceil(segEnd - totalMin)) : null;

  // いま
  const nowEl = document.getElementById('nnNow');
  if (isJiyu || !currentEv) {
    nowEl.textContent = 'じゆう';
    nowEl.className   = 'nn-value is-jiyu';
  } else {
    nowEl.textContent = currentEv.emoji + ' ' + currentEv.name;
    nowEl.className   = 'nn-value';
  }

  // つぎ
  const nextEl = document.getElementById('nnNext');
  nextEl.textContent = nextEv ? nextEv.emoji + ' ' + nextEv.name : '—';
  nextEl.className   = 'nn-value';

  // タイマー
  const minEl  = document.getElementById('nnMin');
  const unitEl = document.getElementById('nnUnit');
  const arc    = document.getElementById('nnArc');

  if (remMin === null) {
    minEl.textContent  = '—';
    unitEl.textContent = '';
    arc.style.strokeDasharray = `0 ${CIRC}`;
    arc.className = 'nn-timer-arc';
  } else {
    minEl.textContent  = remMin;
    unitEl.textContent = 'ふん';
    const ratio = segTotal > 0 ? remMin / segTotal : 0;
    const filled = CIRC * ratio;
    arc.style.strokeDasharray = `${filled} ${CIRC - filled}`;
    arc.className = 'nn-timer-arc' + (isJiyu ? ' jiyu' : '');
  }
}

let userScrolled = false, scrollTimeout;
document.getElementById('timelineScroll').addEventListener('scroll', () => {
  userScrolled = true;
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => { userScrolled = false; }, 5000);
});
function autoScroll(nowPx) {
  if (userScrolled) return;
  const el = document.getElementById('timelineScroll');
  el.scrollTo({ top: Math.max(0, nowPx - el.clientHeight * 0.38), behavior: 'smooth' });
}

// 写真ポップアップ
// ═══════════════════════════════════
function openPhotoPopup(i) {
  const ev = events[i];
  document.getElementById('popupTitle').textContent = ev.emoji + ' ' + ev.name;
  document.getElementById('popupTime').textContent  = formatAmPm(ev.start) + ' 〜 ' + formatAmPm(ev.end);
  document.getElementById('popupPhotos').innerHTML  =
    Array(ev.photos||0).fill('<div class="popup-photo">🖼️</div>').join('');
  document.getElementById('photoOverlay').classList.add('open');
}
document.getElementById('photoOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('photoOverlay'))
    document.getElementById('photoOverlay').classList.remove('open');
});
document.getElementById('photoClose').addEventListener('click', () =>
  document.getElementById('photoOverlay').classList.remove('open'));

// ═══════════════════════════════════
// 編集メニュー
// ═══════════════════════════════════
let editingIndex = -1, editingExtraIndex = -1, editingBaseKey = null;

function openEditMenu(evIndex) {
  const ev = events[evIndex];
  editingIndex      = evIndex;
  editingBaseKey    = isBaseEvent(ev) ? ev.name : null;
  editingExtraIndex = isBaseEvent(ev) ? -1 : extraEvents.findIndex(e =>
    e.name === ev.name && e.start === ev.start && e.end === ev.end);
  document.getElementById('editMenuTitle').textContent = ev.emoji + ' ' + ev.name;
  document.getElementById('editMenuOverlay').classList.add('open');
}

function deleteEvent(evOverride = null) {
  // evOverride: 一覧から直接削除する場合に使用
  const ev        = evOverride || events[editingIndex];
  const bKey      = evOverride ? (isBaseEvent(ev) ? ev.name : null) : editingBaseKey;
  const extraIdx  = evOverride
    ? extraEvents.findIndex(e => e.name === ev.name && e.start === ev.start && e.end === ev.end)
    : editingExtraIndex;

  if (bKey) {
    if (!deletedBaseKeys.includes(bKey)) deletedBaseKeys.push(bKey);
    delete baseOverrides[bKey];
    saveData();
  } else if (extraIdx >= 0) {
    extraEvents.splice(extraIdx, 1);
    saveData();
  }
  document.getElementById('editMenuOverlay').classList.remove('open');
  events = getEventsForDate(selectedDate);
  buildTimeline(); buildMonthCalendar();
  buildSidebarList();
}

function openEditForm(evOverride = null) {
  document.getElementById('editMenuOverlay').classList.remove('open');
  const ev = evOverride || events[editingIndex];
  if (evOverride) {
    editingBaseKey    = isBaseEvent(ev) ? ev.name : null;
    editingExtraIndex = isBaseEvent(ev) ? -1 : extraEvents.findIndex(e =>
      e.name === ev.name && e.start === ev.start && e.end === ev.end);
  }
  openAddModal(ev);
}

document.getElementById('editMenuOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('editMenuOverlay'))
    document.getElementById('editMenuOverlay').classList.remove('open');
});
document.getElementById('editMenuClose').addEventListener('click', () =>
  document.getElementById('editMenuOverlay').classList.remove('open'));

// ═══════════════════════════════════
// 予定追加・編集フォーム
// ═══════════════════════════════════
let selectedEmoji = '⭐';

function openAddModal(editEv = null) {
  document.getElementById('addModalTitle').textContent  = editEv ? 'よていを編集' : 'よていを入れる';
  document.getElementById('formSubmitBtn').textContent  = editEv ? '保存する' : 'よていを入れる';
  if (editEv) selectedEmoji = editEv.emoji;

  // 絵文字
  const row = document.getElementById('emojiRow');
  row.innerHTML = '';
  EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'emoji-pick' + (em === selectedEmoji ? ' selected' : '');
    btn.textContent = em;
    btn.onclick = () => {
      selectedEmoji = em;
      document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    row.appendChild(btn);
  });

  // 時間セレクト
  ['fStartH','fEndH'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    for (let i = 1; i <= 12; i++) sel.innerHTML += `<option>${i}</option>`;
  });
  ['fStartM','fEndM'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    [0,5,10,15,20,25,30,35,40,45,50,55].forEach(m =>
      sel.innerHTML += `<option value="${m}">${pad2(m)}</option>`);
  });

  // 曜日
  const dc = document.getElementById('dayChecks');
  dc.innerHTML = '';
  YOUBI_SHORT.forEach((d, i) => {
    const checked = editEv && editEv.days && editEv.days.includes(i);
    const lbl = document.createElement('label');
    lbl.className = 'day-check-label' + (checked ? ' checked' : '');
    lbl.innerHTML = `<input type="checkbox" value="${i}"${checked ? ' checked' : ''}>${d}`;
    lbl.querySelector('input').addEventListener('change', e =>
      lbl.classList.toggle('checked', e.target.checked));
    dc.appendChild(lbl);
  });

  // くりかえしトグル
  document.querySelectorAll('input[name="repeatMode"]').forEach(r => {
    r.addEventListener('change', () => {
      const weekly = document.querySelector('input[name="repeatMode"]:checked').value === 'weekly';
      document.getElementById('weeklySection').style.display = weekly ? '' : 'none';
      document.getElementById('onceSection').style.display   = weekly ? 'none' : '';
      document.getElementById('repeatBtn').classList.toggle('checked', weekly);
      document.getElementById('onceBtn').classList.toggle('checked', !weekly);
    });
  });
  document.getElementById('repeatBtn').onclick = () => {
    document.querySelector('input[name="repeatMode"][value="weekly"]').checked = true;
    document.querySelector('input[name="repeatMode"]').dispatchEvent(new Event('change'));
  };
  document.getElementById('onceBtn').onclick = () => {
    document.querySelector('input[name="repeatMode"][value="once"]').checked = true;
    document.querySelector('input[name="repeatMode"]').dispatchEvent(new Event('change'));
  };

  const isOnce = editEv && !!editEv.onceDate;
  document.querySelector('input[name="repeatMode"][value="weekly"]').checked = !isOnce;
  document.querySelector('input[name="repeatMode"][value="once"]').checked   = isOnce;
  document.getElementById('weeklySection').style.display = isOnce ? 'none' : '';
  document.getElementById('onceSection').style.display   = isOnce ? '' : 'none';
  document.getElementById('repeatBtn').classList.toggle('checked', !isOnce);
  document.getElementById('onceBtn').classList.toggle('checked', isOnce);

  // 日付
  const defDate = editEv?.onceDate || dateStr(selectedDate);
  document.getElementById('fDate').value = defDate;

  // 時間プリセット
  function setTimeParts(t, ampmId, hId, mId) {
    if (!t) return;
    const [h24,m] = t.split(':').map(Number);
    const h12 = h24 === 0 ? 12 : h24 > 12 ? h24-12 : h24;
    document.getElementById(ampmId).value = h24 < 12 ? 'AM' : 'PM';
    document.getElementById(hId).value    = h12;
    document.getElementById(mId).value    = m;
  }
  setTimeParts(editEv?.start, 'fStartAmpm','fStartH','fStartM');
  setTimeParts(editEv?.end,   'fEndAmpm',  'fEndH',  'fEndM');

  document.getElementById('fName').value = editEv?.name || '';
  document.getElementById('addOverlay').classList.add('open');
}

function ampmTo24(ampm, h, m) {
  let h24 = parseInt(h);
  if (ampm === 'AM' && h24 === 12) h24 = 0;
  if (ampm === 'PM' && h24 !== 12) h24 += 12;
  return `${pad2(h24)}:${pad2(m)}`;
}

function submitEvent() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { alert('よていのなまえを入れてください'); return; }

  const start = ampmTo24(document.getElementById('fStartAmpm').value,
    document.getElementById('fStartH').value, document.getElementById('fStartM').value);
  const end   = ampmTo24(document.getElementById('fEndAmpm').value,
    document.getElementById('fEndH').value,   document.getElementById('fEndM').value);

  const mode = document.querySelector('input[name="repeatMode"]:checked').value;
  let newEv;
  if (mode === 'weekly') {
    const days = [...document.querySelectorAll('#dayChecks input:checked')].map(el => parseInt(el.value));
    if (!days.length) { alert('曜日を選んでください'); return; }
    newEv = { name, start, end, emoji: selectedEmoji, days, photos: 0 };
  } else {
    const dateVal = document.getElementById('fDate').value;
    if (!dateVal) { alert('日にちを選んでください'); return; }
    newEv = { name, start, end, emoji: selectedEmoji, days: [], onceDate: dateVal, photos: 0 };
  }

  if (editingBaseKey) {
    baseOverrides[editingBaseKey] = newEv;
    saveData();
  } else if (editingExtraIndex >= 0) {
    extraEvents.splice(editingExtraIndex, 1, newEv);
    saveData();
  } else {
    extraEvents.push(newEv);
    saveData();
  }
  editingExtraIndex = -1; editingIndex = -1; editingBaseKey = null;
  document.getElementById('addOverlay').classList.remove('open');
  events = getEventsForDate(selectedDate);
  buildTimeline(); buildMonthCalendar();
  buildSidebarList();
  updateNowLine();
}

document.getElementById('addOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('addOverlay'))
    document.getElementById('addOverlay').classList.remove('open');
});
document.getElementById('addClose').addEventListener('click', () =>
  document.getElementById('addOverlay').classList.remove('open'));

// 月ナビ
document.getElementById('prevMonth').addEventListener('click', () => {
  calViewMonth--;
  if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
  buildMonthCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  calViewMonth++;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  buildMonthCalendar();
});

// 初期化（Firebaseからデータ受け取り後に呼ばれる）
// ═══════════════════════════════════
window._syncFromFirestore = function() {
  extraEvents     = window._extraEvents     || [];
  baseOverrides   = window._baseOverrides   || {};
  deletedBaseKeys = window._deletedBaseKeys || [];
  events = getEventsForDate(selectedDate);
  buildTimeline();
  buildMonthCalendar();
  buildSidebarList();
  updateNowLine();
};

window._initApp = function() {
  extraEvents     = window._extraEvents     || [];
  baseOverrides   = window._baseOverrides   || {};
  deletedBaseKeys = window._deletedBaseKeys || [];
  updateHeader();
  buildMonthCalendar();
  buildSidebarList();
  buildTimeline();
  updateNowLine();
  window._appReady = true;
  setInterval(() => {
    updateNowLine();
    buildSidebarList();
    if (dateStr(realToday) !== dateStr(new Date())) location.reload();
  }, 10000);
};
